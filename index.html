<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>簡報風格 YAML 提示詞產生器</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 0; background: #0f172a; color: #e5e7eb; }
    header { padding: 1.5rem 2rem; background: #020617; border-bottom: 1px solid #1f2933; }
    header h1 { margin: 0; font-size: 1.5rem; color: #38bdf8; }
    header p { margin: 0.25rem 0 0; font-size: 0.9rem; color: #9ca3af; }
    main { display: flex; gap: 1.5rem; padding: 1.5rem 2rem 2rem; box-sizing: border-box; }
    .column { flex: 1; min-width: 0; }
    .card { background: #020617; border-radius: 0.75rem; padding: 1.25rem 1.5rem; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.9); border: 1px solid #1f2937; box-sizing: border-box; }
    h2 { margin-top: 0; font-size: 1.2rem; color: #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    h2 span { font-size: 0.75rem; color: #9ca3af; font-weight: 400; }
    .field-group { margin-bottom: 1rem; }
    .field-group label { display: block; font-size: 0.9rem; color: #cbd5e1; margin-bottom: 0.25rem; }
    .field-group small { display: block; font-size: 0.75rem; color: #6b7280; margin-top: 0.15rem; }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; box-sizing: border-box; padding: 0.45rem 0.55rem; border-radius: 0.5rem;
      border: 1px solid #374151; background: #020617; color: #e5e7eb; font-size: 0.9rem; outline: none;
    }
    input[type="text"]:focus, input[type="number"]:focus, select:focus, textarea:focus {
      border-color: #38bdf8; box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
    }
    textarea { min-height: 480px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; white-space: pre; }
    .inline { display: flex; gap: 0.75rem; }
    .inline .field-group { flex: 1; }
    .badge-fixed { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.7rem; background: #1e293b; color: #9ca3af; border: 1px solid #334155; margin-left: 0.3rem; }
    .color-row { display: grid; grid-template-columns: 48px 1fr 64px; gap: 0.5rem; align-items: center; }
    input[type="color"]{ width: 48px; height: 36px; padding: 0; border-radius: 0.5rem; border: 1px solid #374151; background: transparent; cursor: pointer; }
    .color-swatch { width: 64px; height: 36px; border-radius: 0.5rem; border: 1px solid #374151; background: #000; }
    .actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    button { padding: 0.4rem 0.85rem; border-radius: 999px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.25rem; }
    .btn-primary { background: #38bdf8; color: #020617; }
    .btn-primary:hover { background: #0ea5e9; }
    .btn-secondary { background: #111827; color: #e5e7eb; border: 1px solid #374151; }
    .btn-secondary:hover { background: #1f2937; }
    .hint { font-size: 0.8rem; color: #6b7280; margin-top: 0.25rem; }
    @media (max-width: 960px) { main { flex-direction: column; } textarea { min-height: 320px; } }

    /* ===== 顏色設定（依你目前需求）===== */
    .column:first-child h2 { color: #DCFF5C; }
    .column:last-child h2 { color: #FE86E8; }
    #yamlOutput { color: #e5e7eb; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>
  <header>
    <h1>簡報風格 YAML 提示詞產生器</h1>
    <p>左側即時更新 → 右側 YAML；可下載含日期時間的 TXT / YAML / PDF</p>
  </header>

  <main>
    <!-- Left -->
    <section class="column">
      <div class="card">
        <h2>基本設定 <span>metadata</span></h2>

        <div class="field-group">
          <label>簡報名稱 (metadata.name)</label>
          <input type="text" id="name" value="Cybersecurity Training" />
        </div>

        <div class="field-group">
          <label>作者 / 團隊 (metadata.author)</label>
          <input type="text" id="author" value="Cybersecurity Education Team" />
        </div>

        <div class="field-group">
          <label>簡報用途描述 (metadata.description)</label>
          <input type="text" id="description" value="資安教育簡報的統一風格指南" />
        </div>

        <div class="inline">
          <div class="field-group">
            <label>版本 <span class="badge-fixed">固定欄位</span></label>
            <input type="text" id="version" value="1.0" />
          </div>
          <div class="field-group">
            <label>語言代碼 (metadata.language)</label>
            <input type="text" id="language" value="zh-TW" />
          </div>
        </div>

        <hr style="border-color:#1f2937; margin: 1rem 0;" />
        <h2>主題與配色 <span>theme</span></h2>

        <div class="field-group">
          <label>主題風格 (theme.style)</label>
          <select id="themeStylePreset">
            <option value="現代科技風" selected>現代科技風</option>
            <option value="極簡風">極簡風</option>
            <option value="商務專業風">商務專業風</option>
            <option value="暗黑高對比風">暗黑高對比風</option>
            <option value="教育課程風">教育課程風</option>
            <option value="資訊圖表風">資訊圖表風</option>
            <option value="新創提案風">新創提案風</option>
            <option value="雜誌排版風">雜誌排版風</option>
            <option value="大字標題風">大字標題風</option>
            <option value="簡約優雅風">簡約優雅風</option>
            <option value="__custom__">其他（自行輸入）</option>
          </select>
          <small>切換主題會自動帶入配色/字體/條列上限，並同步更新 style_summary。</small>
          <div id="themeStyleCustomWrap" style="display:none; margin-top:0.5rem;">
            <input type="text" id="themeStyleCustom" placeholder="請輸入主題風格（中文）" />
          </div>
        </div>

        <div class="field-group">
          <label>色彩模式 (theme.mode)</label>
          <select id="mode">
            <option value="dark">深色</option>
            <option value="light" selected>淺色</option>
          </select>
        </div>

        <div class="field-group">
          <label>主色 primary_color</label>
          <div class="color-row">
            <input type="color" id="primaryColorPicker" value="#373399" aria-label="主色選擇器">
            <input type="text" id="primaryColor" value="#373399" placeholder="#rrggbb" />
            <div class="color-swatch" id="primarySwatch"></div>
          </div>
        </div>

        <div class="field-group">
          <label>強調色 accent_color</label>
          <div class="color-row">
            <input type="color" id="accentColorPicker" value="#10b981" aria-label="強調色選擇器">
            <input type="text" id="accentColor" value="#10b981" placeholder="#rrggbb" />
            <div class="color-swatch" id="accentSwatch"></div>
          </div>
        </div>

        <hr style="border-color:#1f2937; margin: 1rem 0;" />
        <h2>字體與排版 <span>typography</span></h2>

        <div class="field-group">
          <label>標題字體 (typography.heading_font)</label>
          <input type="text" id="headingFont" value="Arial, sans-serif" />
        </div>

        <div class="field-group">
          <label>內文字體 (typography.body_font)</label>
          <input type="text" id="bodyFont" value="Arial, sans-serif" />
        </div>

        <div class="inline">
          <div class="field-group">
            <label>主標題基準字級 (px)</label>
            <input type="number" id="headingSize" value="36" />
          </div>
          <div class="field-group">
            <label>內文字級 (px)</label>
            <input type="number" id="bodySize" value="18" />
          </div>
        </div>

        <hr style="border-color:#1f2937; margin: 1rem 0;" />
        <h2>內容規則 <span>content_rules</span></h2>

        <div class="inline">
          <div class="field-group">
            <label>每張投影片條列上限</label>
            <input type="number" id="maxBullets" value="5" />
          </div>
          <div class="field-group">
            <label>每條條列字數上限</label>
            <input type="number" id="maxWords" value="20" />
          </div>
        </div>

        <div class="field-group">
          <label>單一段落最多行數</label>
          <input type="number" id="maxLines" value="8" />
        </div>

        <div class="field-group">
          <label>風格一句話說明 (guidelines.style_summary)</label>
          <select id="styleSummaryPreset">
            <option value="現代科技風格、深色主題、強調可讀與對比" selected>現代科技風（深色、清晰對比）</option>
            <option value="極簡風格、留白充足、重點聚焦於關鍵文字">極簡風（大量留白、聚焦重點）</option>
            <option value="企業簡報風格、版面整齊、資訊層級清楚">商務專業風（規範排版、層級清楚）</option>
            <option value="資訊圖表風格、以圖示與數據視覺化為主">資訊圖表風（圖示、數據可視化）</option>
            <option value="大字標題風格、強烈字體層級、少文字高衝擊">大字標題風（強烈字體層級）</option>
            <option value="扁平化設計、少陰影少裝飾、圖形簡潔">扁平化風（簡潔圖形）</option>
            <option value="儀表板風格、卡片區塊分明、適合 KPI 與監控數據">儀表板風（KPI 與監控數據）</option>
            <option value="教學課程風格、逐步引導、重點提示清晰">教學風（逐步引導、重點提示）</option>
            <option value="產品簡報風格、主打價值主張、搭配大圖與賣點">產品風（價值主張、賣點）</option>
            <option value="新創募資風格、故事線清晰、結論導向">新創募資風（故事線、結論導向）</option>
            <option value="__custom__">其他（自行輸入）</option>
          </select>

          <div id="styleSummaryCustomWrap" style="display:none; margin-top:0.5rem;">
            <input type="text" id="styleSummaryCustom" placeholder="請輸入你的風格一句話說明" />
          </div>
        </div>

        <div class="field-group">
          <label>內容密度規則 (guidelines.content_density_rule)</label>
          <input type="text" id="densityRule" value="每張投影片僅包含一個主要概念，條列不超過上限，必要時拆成多張。" />
        </div>

        <hr style="border-color:#1f2937; margin: 1rem 0;" />
        <h2>下載設定 <span>export</span></h2>

        <div class="inline">
          <div class="field-group">
            <label>檔名前綴</label>
            <input type="text" id="filePrefix" value="YAML" />
            <small>例：YAML-2026-01-10_11-36-00.yaml</small>
          </div>
          <div class="field-group">
            <label>時間格式</label>
            <select id="timestampFormat">
              <option value="date" selected>YYYY-MM-DD</option>
              <option value="datetime">YYYY-MM-DD_HH-mm-ss</option>
            </select>
          </div>
        </div>

        <div class="inline">
          <div class="field-group">
            <label>下載格式</label>
            <select id="downloadFormat">
              <option value="yaml" selected>.yaml</option>
              <option value="txt">.txt</option>
              <option value="pdf">.pdf</option>
            </select>
          </div>
          <div class="field-group">
            <label>PDF：字級 (pt)</label>
            <input type="number" id="pdfFontSize" value="10" />
          </div>
        </div>

        <div class="actions">
          <button class="btn-primary" type="button" id="btnDownload">下載檔案</button>
          <button class="btn-secondary" type="button" id="btnReset">重設為預設值</button>
        </div>
      </div>
    </section>

    <!-- Right -->
    <section class="column">
      <div class="card">
        <h2>YAML 提示詞輸出 <span>可複製貼入 AI 系統</span></h2>
        <textarea id="yamlOutput" readonly></textarea>
        <div class="actions">
          <button class="btn-secondary" type="button" id="btnCopy">複製 YAML</button>
          <span class="hint" id="copyHint"></span>
        </div>
      </div>
    </section>
  </main>

  <script>
    function escapeYamlString(str) {
      if (str === null || str === undefined) return '""';
      const s = String(str);
      if (/[":#\n\r\t]|^\s|\s$/.test(s)) {
        return '"' + s.replace(/\\/g, "\\\\").replace(/"/g, '\\"') + '"';
      }
      return s;
    }

    function normalizeHex(hex) {
      if (!hex) return null;
      const s = String(hex).trim();
      const m = s.match(/^#([0-9a-fA-F]{6})$/);
      return m ? ("#" + m[1].toLowerCase()) : null;
    }

    function setColorAll(kind, hex) {
      const normalized = normalizeHex(hex) || "#000000";
      if (kind === "primary") {
        document.getElementById("primaryColorPicker").value = normalized;
        document.getElementById("primaryColor").value = normalized;
        document.getElementById("primarySwatch").style.background = normalized;
      } else if (kind === "accent") {
        document.getElementById("accentColorPicker").value = normalized;
        document.getElementById("accentColor").value = normalized;
        document.getElementById("accentSwatch").style.background = normalized;
      }
    }

    function syncColorFromPicker(pickerId, textId, swatchId) {
      const picker = document.getElementById(pickerId);
      const text = document.getElementById(textId);
      const swatch = document.getElementById(swatchId);
      const hex = normalizeHex(picker.value) || "#000000";
      text.value = hex;
      swatch.style.background = hex;
      generateYaml();
    }

    function syncColorFromText(textId, pickerId, swatchId) {
      const text = document.getElementById(textId);
      const picker = document.getElementById(pickerId);
      const swatch = document.getElementById(swatchId);
      const hex = normalizeHex(text.value);
      if (hex) {
        picker.value = hex;
        swatch.style.background = hex;
      } else {
        swatch.style.background = "#000000";
      }
      generateYaml();
    }

    const THEME_PRESETS = {
      /* 已修改：現代科技風 -> mode light, primary #373399 */
      "現代科技風": { mode: "light", primary: "#373399", accent: "#10b981", headingFont: "Arial, sans-serif", bodyFont: "Arial, sans-serif", maxBullets: 5 },
      "極簡風":     { mode: "light", primary: "#111827", accent: "#2563eb", headingFont: "Arial, sans-serif", bodyFont: "Arial, sans-serif", maxBullets: 4 },
      "商務專業風": { mode: "light", primary: "#1d4ed8", accent: "#64748b", headingFont: "Arial, sans-serif", bodyFont: "Arial, sans-serif", maxBullets: 4 },
      "暗黑高對比風": { mode: "dark", primary: "#fbbf24", accent: "#38bdf8", headingFont: "Arial, sans-serif", bodyFont: "Arial, sans-serif", maxBullets: 4 },
      "教育課程風": { mode: "light", primary: "#0f766e", accent: "#f59e0b", headingFont: "Arial, sans-serif", bodyFont: "Arial, sans-serif", maxBullets: 5 },
      "資訊圖表風": { mode: "light", primary: "#0ea5e9", accent: "#f97316", headingFont: "Arial, sans-serif", bodyFont: "Arial, sans-serif", maxBullets: 4 },
      "新創提案風": { mode: "dark",  primary: "#a78bfa", accent: "#fbbf24", headingFont: "Arial, sans-serif", bodyFont: "Arial, sans-serif", maxBullets: 3 },
      "雜誌排版風": { mode: "light", primary: "#111827", accent: "#ef4444", headingFont: "Georgia, serif", bodyFont: "Arial, sans-serif", maxBullets: 4 },
      "大字標題風": { mode: "dark",  primary: "#ffffff", accent: "#22c55e", headingFont: "Arial Black, Arial, sans-serif", bodyFont: "Arial, sans-serif", maxBullets: 3 },
      "簡約優雅風": { mode: "light", primary: "#0f172a", accent: "#10b981", headingFont: "Georgia, serif", bodyFont: "Arial, sans-serif", maxBullets: 4 }
    };

    const STYLE_SUMMARY_BY_THEME = {
      "現代科技風": "現代科技風格、深色主題、強調可讀與對比",
      "極簡風": "極簡風格、留白充足、重點聚焦於關鍵文字",
      "商務專業風": "企業簡報風格、版面整齊、資訊層級清楚",
      "暗黑高對比風": "暗黑高對比風格、強烈對比、強調關鍵資訊",
      "教育課程風": "教學課程風格、逐步引導、重點提示清晰",
      "資訊圖表風": "資訊圖表風格、以圖示與數據視覺化為主",
      "新創提案風": "新創募資風格、故事線清晰、結論導向",
      "雜誌排版風": "雜誌排版風格、視覺層級清楚、閱讀節奏分明",
      "大字標題風": "大字標題風格、強烈字體層級、少文字高衝擊",
      "簡約優雅風": "簡約優雅風格、配色克制、留白與對齊一致"
    };

    function syncStyleSummaryUI() {
      const preset = document.getElementById("styleSummaryPreset").value;
      document.getElementById("styleSummaryCustomWrap").style.display =
        (preset === "__custom__") ? "block" : "none";
    }

    function getStyleSummaryValue() {
      const preset = document.getElementById("styleSummaryPreset").value;
      if (preset === "__custom__") {
        return document.getElementById("styleSummaryCustom").value.trim();
      }
      return preset;
    }

    function setStyleSummary(summaryText) {
      const selectEl = document.getElementById("styleSummaryPreset");
      const customEl = document.getElementById("styleSummaryCustom");

      let found = false;
      for (const opt of selectEl.options) {
        if (opt.value === summaryText) { found = true; break; }
      }

      if (found) {
        selectEl.value = summaryText;
        customEl.value = "";
      } else {
        selectEl.value = "__custom__";
        customEl.value = summaryText || "";
      }

      syncStyleSummaryUI();
    }

    function applyThemePreset(styleName) {
      const preset = THEME_PRESETS[styleName];
      if (!preset) return;

      document.getElementById("mode").value = preset.mode;
      document.getElementById("headingFont").value = preset.headingFont;
      document.getElementById("bodyFont").value = preset.bodyFont;
      document.getElementById("maxBullets").value = String(preset.maxBullets);

      setColorAll("primary", preset.primary);
      setColorAll("accent", preset.accent);

      const summary = STYLE_SUMMARY_BY_THEME[styleName];
      if (summary) setStyleSummary(summary);

      generateYaml();
    }

    function onThemeStyleChange() {
      const preset = document.getElementById("themeStylePreset").value;
      const wrap = document.getElementById("themeStyleCustomWrap");
      const isCustom = (preset === "__custom__");
      wrap.style.display = isCustom ? "block" : "none";

      if (!isCustom) {
        applyThemePreset(preset);
        return;
      }
      generateYaml();
    }

    function getThemeStyleValue() {
      const preset = document.getElementById("themeStylePreset").value;
      if (preset === "__custom__") {
        return document.getElementById("themeStyleCustom").value.trim();
      }
      return preset;
    }

    function generateYaml() {
      syncStyleSummaryUI();

      const name = document.getElementById("name").value;
      const author = document.getElementById("author").value;
      const description = document.getElementById("description").value;
      const version = document.getElementById("version").value;
      const language = document.getElementById("language").value;

      const themeStyle = getThemeStyleValue();
      const mode = document.getElementById("mode").value;

      const primaryColor = document.getElementById("primaryColor").value;
      const accentColor = document.getElementById("accentColor").value;

      const headingFont = document.getElementById("headingFont").value;
      const bodyFont = document.getElementById("bodyFont").value;
      const headingSize = document.getElementById("headingSize").value;
      const bodySize = document.getElementById("bodySize").value;

      const maxBullets = document.getElementById("maxBullets").value;
      const maxWords = document.getElementById("maxWords").value;
      const maxLines = document.getElementById("maxLines").value;

      const styleSummary = getStyleSummaryValue();
      const densityRule = document.getElementById("densityRule").value;

      const yaml =
`metadata:
  version: ${escapeYamlString(version)}
  name: ${escapeYamlString(name)}
  author: ${escapeYamlString(author)}
  description: ${escapeYamlString(description)}
  language: ${escapeYamlString(language)}

theme:
  style: ${escapeYamlString(themeStyle)}
  mode: ${escapeYamlString(mode)}
  primary_color: ${escapeYamlString(primaryColor)}
  accent_color: ${escapeYamlString(accentColor)}

typography:
  heading_font: ${escapeYamlString(headingFont)}
  body_font: ${escapeYamlString(bodyFont)}
  heading_base_size: ${escapeYamlString(headingSize)}
  body_base_size: ${escapeYamlString(bodySize)}

layout:
  slide_width: 960
  slide_height: 540
  padding_top: 64
  padding_bottom: 64
  max_content_height: 412

content_rules:
  max_bullets_per_slide: ${maxBullets}
  max_words_per_bullet: ${maxWords}
  max_lines_per_paragraph: ${maxLines}
  one_main_idea_per_slide: true

guidelines:
  style_summary: ${escapeYamlString(styleSummary)}
  content_density_rule: ${escapeYamlString(densityRule)}
`;
      document.getElementById("yamlOutput").value = yaml;
    }

    function pad2(n) { return String(n).padStart(2, "0"); }

    function formatTimestamp(formatKey) {
      const d = new Date();
      const y = d.getFullYear();
      const m = pad2(d.getMonth() + 1);
      const day = pad2(d.getDate());
      const hh = pad2(d.getHours());
      const mm = pad2(d.getMinutes());
      const ss = pad2(d.getSeconds());
      if (formatKey === "date") return `${y}-${m}-${day}`;
      return `${y}-${m}-${day}_${hh}-${mm}-${ss}`;
    }

    function makeSafeFilename(name) {
      const base = (name || "YAML")
        .toString()
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "-")
        .replace(/\s+/g, "_");
      return base || "YAML";
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function downloadCurrentAsText(ext) {
      generateYaml();
      const yamlText = document.getElementById("yamlOutput").value || "";
      const prefix = makeSafeFilename(document.getElementById("filePrefix").value || "YAML");
      const ts = formatTimestamp(document.getElementById("timestampFormat").value);
      const filename = `${prefix}-${ts}.${ext}`;

      const mime = (ext === "txt") ? "text/plain;charset=utf-8" : "text/yaml;charset=utf-8";
      const blob = new Blob([yamlText], { type: mime });
      downloadBlob(blob, filename);
    }

    function downloadCurrentAsPdf() {
      generateYaml();
      const yamlText = document.getElementById("yamlOutput").value || "";
      const prefix = makeSafeFilename(document.getElementById("filePrefix").value || "YAML");
      const ts = formatTimestamp(document.getElementById("timestampFormat").value);
      const filename = `${prefix}-${ts}.pdf`;

      const fontSize = Number(document.getElementById("pdfFontSize").value || 10);

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "pt", format: "a4" });
      doc.setFont("courier", "normal");
      doc.setFontSize(fontSize);

      const margin = 36;
      const pageWidth = doc.internal.pageSize.getWidth();
      const maxWidth = pageWidth - margin * 2;

      const lines = doc.splitTextToSize(yamlText, maxWidth);
      doc.text(lines, margin, margin);
      doc.save(filename);
    }

    function downloadFile() {
      const fmt = document.getElementById("downloadFormat").value;
      if (fmt === "pdf") downloadCurrentAsPdf();
      else if (fmt === "txt") downloadCurrentAsText("txt");
      else downloadCurrentAsText("yaml");
    }

    function resetForm() {
      document.getElementById("name").value = "Cybersecurity Training";
      document.getElementById("author").value = "Cybersecurity Education Team";
      document.getElementById("description").value = "資安教育簡報的統一風格指南";
      document.getElementById("version").value = "1.0";
      document.getElementById("language").value = "zh-TW";

      document.getElementById("themeStylePreset").value = "現代科技風";
      document.getElementById("themeStyleCustom").value = "";
      document.getElementById("themeStyleCustomWrap").style.display = "none";

      document.getElementById("headingSize").value = "36";
      document.getElementById("bodySize").value = "18";
      document.getElementById("maxWords").value = "20";
      document.getElementById("maxLines").value = "8";

      document.getElementById("densityRule").value =
        "每張投影片僅包含一個主要概念，條列不超過上限，必要時拆成多張。";

      document.getElementById("filePrefix").value = "YAML";
      document.getElementById("timestampFormat").value = "date";
      document.getElementById("downloadFormat").value = "yaml";
      document.getElementById("pdfFontSize").value = "10";

      applyThemePreset("現代科技風");
      generateYaml();
    }

    function copyYaml() {
      const ta = document.getElementById("yamlOutput");
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, 999999);

      const ok = document.execCommand("copy");
      const hint = document.getElementById("copyHint");
      hint.textContent = ok ? "已複製到剪貼簿" : "無法自動複製，請手動選取";
      setTimeout(() => { hint.textContent = ""; }, 2000);
    }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("btnDownload").addEventListener("click", downloadFile);
      document.getElementById("btnReset").addEventListener("click", resetForm);
      document.getElementById("btnCopy").addEventListener("click", copyYaml);

      const inputIds = [
        "name","author","description","version","language",
        "primaryColor","accentColor","headingFont","bodyFont",
        "headingSize","bodySize","maxBullets","maxWords","maxLines","densityRule",
        "themeStyleCustom","styleSummaryCustom",
        "filePrefix","timestampFormat","downloadFormat","pdfFontSize"
      ];
      inputIds.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("input", generateYaml);
        el.addEventListener("change", generateYaml);
      });

      document.getElementById("themeStylePreset").addEventListener("change", onThemeStyleChange);

      const ssp = document.getElementById("styleSummaryPreset");
      ssp.addEventListener("change", () => { syncStyleSummaryUI(); generateYaml(); });
      ssp.addEventListener("input",  () => { syncStyleSummaryUI(); generateYaml(); });

      document.getElementById("primaryColorPicker").addEventListener("input", () =>
        syncColorFromPicker("primaryColorPicker", "primaryColor", "primarySwatch")
      );
      document.getElementById("accentColorPicker").addEventListener("input", () =>
        syncColorFromPicker("accentColorPicker", "accentColor", "accentSwatch")
      );
      document.getElementById("primaryColor").addEventListener("input", () =>
        syncColorFromText("primaryColor", "primaryColorPicker", "primarySwatch")
      );
      document.getElementById("accentColor").addEventListener("input", () =>
        syncColorFromText("accentColor", "accentColorPicker", "accentSwatch")
      );

      document.getElementById("primarySwatch").style.background =
        normalizeHex(document.getElementById("primaryColor").value) || "#000000";
      document.getElementById("accentSwatch").style.background =
        normalizeHex(document.getElementById("accentColor").value) || "#000000";

      // init：依目前 select 的預設（現代科技風）套用 preset（會把 mode/primary 設為新預設）
      onThemeStyleChange();
      syncStyleSummaryUI();
      generateYaml();
    });
  </script>
</body>
</html>
