<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>簡報風格 YAML 提示詞產生器</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 0; background: #0f172a; color: #e5e7eb; }
    header { padding: 1.5rem 2rem; background: #020617; border-bottom: 1px solid #1f2933; }
    header h1 { margin: 0; font-size: 1.5rem; color: #38bdf8; }
    header p { margin: 0.25rem 0 0; font-size: 0.9rem; color: #9ca3af; }
    main { display: flex; gap: 1.5rem; padding: 1.5rem 2rem 2rem; box-sizing: border-box; }
    .column { flex: 1; min-width: 0; }
    .card { background: #020617; border-radius: 0.75rem; padding: 1.25rem 1.5rem; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.9); border: 1px solid #1f2937; box-sizing: border-box; }
    h2 { margin-top: 0; font-size: 1.2rem; color: #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    h2 span { font-size: 0.75rem; color: #9ca3af; font-weight: 400; }
    .field-group { margin-bottom: 1rem; }
    .field-group label { display: block; font-size: 0.9rem; color: #cbd5e1; margin-bottom: 0.25rem; }
    .field-group small { display: block; font-size: 0.75rem; color: #6b7280; margin-top: 0.15rem; }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; box-sizing: border-box; padding: 0.45rem 0.55rem; border-radius: 0.5rem;
      border: 1px solid #374151; background: #020617; color: #e5e7eb; font-size: 0.9rem; outline: none;
    }
    input[type="text"]:focus, input[type="number"]:focus, select:focus, textarea:focus {
      border-color: #38bdf8; box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
    }
    textarea { min-height: 480px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; white-space: pre; }
    .inline { display: flex; gap: 0.75rem; }
    .inline .field-group { flex: 1; }
    .badge-fixed { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.7rem; background: #1e293b; color: #9ca3af; border: 1px solid #334155; margin-left: 0.3rem; }
    .color-row { display: grid; grid-template-columns: 48px 1fr 64px; gap: 0.5rem; align-items: center; }
    input[type="color"]{ width: 48px; height: 36px; padding: 0; border-radius: 0.5rem; border: 1px solid #374151; background: transparent; cursor: pointer; }
    .color-swatch { width: 64px; height: 36px; border-radius: 0.5rem; border: 1px solid #374151; background: #000; }
    .actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    button { padding: 0.4rem 0.85rem; border-radius: 999px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.25rem; }
    .btn-primary { background: #38bdf8; color: #020617; }
    .btn-primary:hover { background: #0ea5e9; }
    .btn-secondary { background: #111827; color: #e5e7eb; border: 1px solid #374151; }
    .btn-secondary:hover { background: #1f2937; }
    .hint { font-size: 0.8rem; color: #6b7280; margin-top: 0.25rem; }
    @media (max-width: 960px) { main { flex-direction: column; } textarea { min-height: 320px; } }

    .column:first-child h2 { color: #DCFF5C; }
    .column:last-child h2 { color: #FE86E8; }
    #yamlOutput { color: #e5e7eb; }

    .locked input, .locked select { opacity: 0.75; }
    .label-h1-color { font-weight: 700; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>
<header>
  <h1>簡報風格 YAML 提示詞產生器</h1>
  <p>左側即時更新 → 右側 YAML；可下載含日期時間的 TXT / YAML / PDF</p>
</header>

<main>
  <section class="column">
    <div class="card">
      <h2>基本設定 <span>metadata</span></h2>

      <div class="field-group">
        <label>簡報名稱 (metadata.name)</label>
        <input type="text" id="name" value="Cybersecurity Training" />
      </div>

      <div class="field-group">
        <label>作者 / 團隊 (metadata.author)</label>
        <input type="text" id="author" value="Cybersecurity Education Team" />
      </div>

      <div class="field-group">
        <label>簡報用途描述 (metadata.description)</label>
        <input type="text" id="description" value="資安教育簡報的統一風格指南" />
      </div>

      <div class="inline">
        <div class="field-group">
          <label>版本 <span class="badge-fixed">固定欄位</span></label>
          <input type="text" id="version" value="1.0" />
        </div>
        <div class="field-group">
          <label>語言代碼 (metadata.language)</label>
          <input type="text" id="language" value="zh-TW" />
        </div>
      </div>

      <hr style="border-color:#1f2937; margin: 1rem 0;" />
      <h2>主題與配色 <span>theme</span></h2>

      <div class="field-group">
        <label>需求類型（guidelines.requirement_type）</label>
        <select id="requirementType">
          <option value="行銷懶人包" selected>行銷懶人包</option>
          <option value="數據分析報告">數據分析報告</option>
          <option value="流程邏輯說明">流程邏輯說明</option>
          <option value="教育知識科普">教育知識科普</option>
          <option value="專業研究報告">專業研究報告</option>
          <option value="歷史演進時間">歷史演進時間</option>
          <option value="創意發想筆記">創意發想筆記</option>
          <option value="社群媒體分享">社群媒體分享</option>
        </select>
      </div>

      <div class="field-group">
        <label>推薦風格（guidelines.recommended_style）</label>
        <select id="recommendedStyle">
          <option value="可愛粉嫩風格" selected>可愛粉嫩風格</option>
          <option value="推薦黑板粉筆風格">推薦黑板粉筆風格</option>
          <option value="手繪塗鴉風格">手繪塗鴉風格</option>
          <option value="企業曼非斯風格">企業曼非斯風格</option>
          <option value="白板馬克筆風格">白板馬克筆風格</option>
          <option value="數據儀表板風">數據儀表板風</option>
          <option value="復古報紙風格">復古報紙風格</option>
          <option value="盲盒公仔風">盲盒公仔風</option>
          <option value="手寫筆跡">手寫筆跡</option>
        </select>
      </div>

      <div class="field-group">
        <label>佈局結構（guidelines.layout_structure）</label>
        <select id="layoutStructure">
          <option value="不指定佈局" selected>不指定佈局</option>
          <option value="中心對焦">中心對焦</option>
          <option value="蛇形流程">蛇形流程</option>
          <option value="左右對比">左右對比</option>
          <option value="網格矩陣">網格矩陣</option>
          <option value="層級金字塔">層級金字塔</option>
        </select>
      </div>

      <div class="field-group">
        <label>推薦設定套用策略（guidelines.recommendation_apply_policy）</label>
        <select id="recommendationApplyPolicy">
          <option value="manual" selected>manual（不自動改 theme/mode/colors）</option>
          <option value="apply_safe">apply_safe（僅調整不衝突的版面/規則）</option>
          <option value="apply_full">apply_full（允許覆蓋部分主題設定；慎用）</option>
        </select>
      </div>

      <div class="field-group">
        <label>主題風格 (theme.style)</label>
        <select id="themeStylePreset">
          <option value="現代科技風" selected>現代科技風</option>
          <option value="極簡風">極簡風</option>
          <option value="商務專業風">商務專業風</option>
          <option value="暗黑高對比風">暗黑高對比風</option>
          <option value="教育課程風">教育課程風</option>
          <option value="資訊圖表風">資訊圖表風</option>
          <option value="新創提案風">新創提案風</option>
          <option value="雜誌排版風">雜誌排版風</option>
          <option value="大字標題風">大字標題風</option>
          <option value="簡約優雅風">簡約優雅風</option>
          <option value="__custom__">其他（自行輸入）</option>
        </select>
        <div id="themeStyleCustomWrap" style="display:none; margin-top:0.5rem;">
          <input type="text" id="themeStyleCustom" placeholder="請輸入主題風格（中文）" />
        </div>
      </div>

      <div class="field-group">
        <label>色彩模式 (theme.mode)</label>
        <select id="mode">
          <option value="dark">深色</option>
          <option value="light" selected>淺色</option>
        </select>
      </div>

      <div class="field-group">
        <label>主色 primary_color（按鈕、圖表、重點框線、連結等；不直接等於文字顏色）</label>
        <div class="color-row">
          <input type="color" id="primaryColorPicker" value="#373399" aria-label="主色選擇器">
          <input type="text" id="primaryColor" value="#373399" placeholder="#rrggbb" />
          <div class="color-swatch" id="primarySwatch"></div>
        </div>
      </div>

      <div class="field-group">
        <label>強調色 accent_color（按鈕、圖表、重點框線、連結等；不直接等於文字顏色）</label>
        <div class="color-row">
          <input type="color" id="accentColorPicker" value="#10b981" aria-label="強調色選擇器">
          <input type="text" id="accentColor" value="#10b981" placeholder="#rrggbb" />
          <div class="color-swatch" id="accentSwatch"></div>
        </div>
      </div>

      <hr style="border-color:#1f2937; margin: 1rem 0;" />
      <h2>字體與排版 <span>typography</span></h2>

      <div class="field-group">
        <label>文字顏色跟隨主題（typography.text_color_policy）</label>
        <select id="textColorPolicy">
          <option value="follow" selected>跟隨主題（H1=主色、H2=強調色、內文=依模式）</option>
          <option value="custom">自訂（H1/H2/內文字色獨立設定）</option>
        </select>
      </div>

      <div id="typographyCustomBlock">
        <div class="inline">
          <div class="field-group">
            <label>第 1 階層（H1）字體</label>
            <select id="level1Font">
              <option value="Arial, sans-serif" selected>Arial (sans-serif)</option>
              <option value="Helvetica, Arial, sans-serif">Helvetica</option>
              <option value="Segoe UI, Arial, sans-serif">Segoe UI</option>
              <option value="Noto Sans TC, Arial, sans-serif">Noto Sans TC</option>
              <option value="Microsoft JhengHei, Arial, sans-serif">微軟正黑體</option>
              <option value="Times New Roman, serif">Times New Roman (serif)</option>
              <option value="Georgia, serif">Georgia (serif)</option>
              <option value="Courier New, monospace">Courier New (monospace)</option>
            </select>
          </div>
          <div class="field-group">
            <label>第 1 階層（H1）粗細</label>
            <select id="level1Weight">
              <option value="normal" selected>非粗體（normal）</option>
              <option value="bold">粗體（bold）</option>
            </select>
          </div>
        </div>

        <div class="inline">
          <div class="field-group">
            <label class="label-h1-color">第 1 階層（H1）文字顏色</label>
            <div class="color-row">
              <input type="color" id="level1ColorPicker" value="#111827" aria-label="H1 顏色">
              <input type="text" id="level1Color" value="#111827" placeholder="#rrggbb" />
              <div class="color-swatch" id="level1Swatch"></div>
            </div>
          </div>
          <div class="field-group">
            <label>第 1 階層（H1）字級 (px)</label>
            <select id="level1Size">
              <option value="32">32</option>
              <option value="36" selected>36</option>
              <option value="40">40</option>
              <option value="44">44</option>
              <option value="48">48</option>
            </select>
          </div>
        </div>

        <div class="inline">
          <div class="field-group">
            <label>第 2 階層（H2）字體</label>
            <select id="level2Font">
              <option value="Arial, sans-serif" selected>Arial (sans-serif)</option>
              <option value="Helvetica, Arial, sans-serif">Helvetica</option>
              <option value="Segoe UI, Arial, sans-serif">Segoe UI</option>
              <option value="Noto Sans TC, Arial, sans-serif">Noto Sans TC</option>
              <option value="Microsoft JhengHei, Arial, sans-serif">微軟正黑體</option>
              <option value="Times New Roman, serif">Times New Roman (serif)</option>
              <option value="Georgia, serif">Georgia (serif)</option>
              <option value="Courier New, monospace">Courier New (monospace)</option>
            </select>
          </div>
          <div class="field-group">
            <label>第 2 階層（H2）粗細</label>
            <select id="level2Weight">
              <option value="normal" selected>非粗體（normal）</option>
              <option value="bold">粗體（bold）</option>
            </select>
          </div>
        </div>

        <div class="inline">
          <div class="field-group">
            <label>第 2 階層（H2）文字顏色</label>
            <div class="color-row">
              <input type="color" id="level2ColorPicker" value="#111827" aria-label="H2 顏色">
              <input type="text" id="level2Color" value="#111827" placeholder="#rrggbb" />
              <div class="color-swatch" id="level2Swatch"></div>
            </div>
          </div>
          <div class="field-group">
            <label>第 2 階層（H2）字級 (px)</label>
            <select id="level2Size">
              <option value="20">20</option>
              <option value="22">22</option>
              <option value="24" selected>24</option>
              <option value="28">28</option>
              <option value="32">32</option>
            </select>
          </div>
        </div>

        <div class="inline">
          <div class="field-group">
            <label>內文文字字體</label>
            <select id="bodyTextFont">
              <option value="Arial, sans-serif" selected>Arial (sans-serif)</option>
              <option value="Helvetica, Arial, sans-serif">Helvetica</option>
              <option value="Segoe UI, Arial, sans-serif">Segoe UI</option>
              <option value="Noto Sans TC, Arial, sans-serif">Noto Sans TC</option>
              <option value="Microsoft JhengHei, Arial, sans-serif">微軟正黑體</option>
              <option value="Times New Roman, serif">Times New Roman (serif)</option>
              <option value="Georgia, serif">Georgia (serif)</option>
              <option value="Courier New, monospace">Courier New (monospace)</option>
            </select>
          </div>
          <div class="field-group">
            <label>內文粗細</label>
            <select id="bodyTextWeight">
              <option value="normal" selected>非粗體（normal）</option>
              <option value="bold">粗體（bold）</option>
            </select>
          </div>
        </div>

        <div class="inline">
          <div class="field-group">
            <label>內文文字顏色</label>
            <div class="color-row">
              <input type="color" id="bodyTextColorPicker" value="#111827" aria-label="內文顏色">
              <input type="text" id="bodyTextColor" value="#111827" placeholder="#rrggbb" />
              <div class="color-swatch" id="bodyTextSwatch"></div>
            </div>
          </div>
          <div class="field-group">
            <label>內文字級 (px)</label>
            <select id="bodyTextSize">
              <option value="14">14</option>
              <option value="16">16</option>
              <option value="18" selected>18</option>
              <option value="20">20</option>
              <option value="22">22</option>
            </select>
          </div>
        </div>
      </div>

      <hr style="border-color:#1f2937; margin: 1rem 0;" />
      <h2>內容規則 <span>content_rules</span></h2>

      <div class="inline">
        <div class="field-group">
          <label>每張投影片條列上限</label>
          <input type="number" id="maxBullets" value="5" />
        </div>
        <div class="field-group">
          <label>每條條列字數上限</label>
          <input type="number" id="maxWords" value="20" />
        </div>
      </div>

      <div class="field-group">
        <label>單一段落最多行數</label>
        <input type="number" id="maxLines" value="8" />
      </div>

      <div class="field-group">
        <label>風格一句話說明 (guidelines.style_summary)</label>
        <select id="styleSummaryPreset">
          <option value="現代科技風格、強調可讀與對比" selected>現代科技風（清晰對比）</option>
          <option value="極簡風格、留白充足、重點聚焦於關鍵文字">極簡風（大量留白、聚焦重點）</option>
          <option value="企業簡報風格、版面整齊、資訊層級清楚">商務專業風（規範排版、層級清楚）</option>
          <option value="資訊圖表風格、以圖示與數據視覺化為主">資訊圖表風（圖示、數據可視化）</option>
          <option value="大字標題風格、強烈字體層級、少文字高衝擊">大字標題風（強烈字體層級）</option>
          <option value="扁平化設計、少陰影少裝飾、圖形簡潔">扁平化風（簡潔圖形）</option>
          <option value="儀表板風格、卡片區塊分明、適合 KPI 與監控數據">儀表板風（KPI 與監控數據）</option>
          <option value="教學課程風格、逐步引導、重點提示清晰">教學風（逐步引導、重點提示）</option>
          <option value="產品簡報風格、主打價值主張、搭配大圖與賣點">產品風（價值主張、賣點）</option>
          <option value="新創募資風格、故事線清晰、結論導向">新創募資風（故事線、結論導向）</option>
          <option value="__custom__">其他（自行輸入）</option>
        </select>

        <div id="styleSummaryCustomWrap" style="display:none; margin-top:0.5rem;">
          <input type="text" id="styleSummaryCustom" placeholder="請輸入你的風格一句話說明" />
        </div>
      </div>

      <div class="field-group">
        <label>內容密度規則 (guidelines.content_density_rule)</label>
        <input type="text" id="densityRule" value="每張投影片僅包含一個主要概念，條列不超過上限，必要時拆成多張。" />
      </div>

      <hr style="border-color:#1f2937; margin: 1rem 0;" />
      <h2>下載設定 <span>export</span></h2>

      <div class="inline">
        <div class="field-group">
          <label>檔名前綴</label>
          <input type="text" id="filePrefix" value="YAML" />
        </div>
        <div class="field-group">
          <label>時間格式</label>
          <select id="timestampFormat">
            <option value="date" selected>YYYY-MM-DD</option>
            <option value="datetime">YYYY-MM-DD_HH-mm-ss</option>
          </select>
        </div>
      </div>

      <div class="inline">
        <div class="field-group">
          <label>下載格式</label>
          <select id="downloadFormat">
            <option value="yaml" selected>.yaml</option>
            <option value="txt">.txt</option>
            <option value="pdf">.pdf</option>
          </select>
        </div>
        <div class="field-group">
          <label>PDF：字級 (pt)</label>
          <input type="number" id="pdfFontSize" value="10" />
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" type="button" id="btnDownload">下載檔案</button>
        <button class="btn-secondary" type="button" id="btnReset">重設為預設值</button>
      </div>
    </div>
  </section>

  <section class="column">
    <div class="card">
      <h2>YAML 提示詞輸出 <span>可複製貼入 AI 系統</span></h2>
      <textarea id="yamlOutput" readonly></textarea>
      <div class="actions">
        <button class="btn-secondary" type="button" id="btnCopy">複製 YAML</button>
        <span class="hint" id="copyHint"></span>
      </div>
    </div>
  </section>
</main>

<script>
  function escapeYamlString(str) {
    if (str === null || str === undefined) return '""';
    const s = String(str);
    if (/[":#\n\r\t]|^\s|\s$/.test(s)) {
      return '"' + s.replace(/\\/g, "\\\\").replace(/"/g, '\\"') + '"';
    }
    return s;
  }

  function yamlBlockScalar(lines) {
    const safeLines = (lines || []).map(s => String(s ?? "").replace(/\r/g, ""));
    return "|\n" + safeLines.map(s => "    " + s).join("\n");
  }

  function normalizeHex(hex) {
    if (!hex) return null;
    const s = String(hex).trim();
    const m = s.match(/^#([0-9a-fA-F]{6})$/);
    return m ? ("#" + m[1].toLowerCase()) : null;
  }

  function setColorAll(kind, hex) {
    const normalized = normalizeHex(hex) || "#000000";
    if (kind === "primary") {
      document.getElementById("primaryColorPicker").value = normalized;
      document.getElementById("primaryColor").value = normalized;
      document.getElementById("primarySwatch").style.background = normalized;
    } else if (kind === "accent") {
      document.getElementById("accentColorPicker").value = normalized;
      document.getElementById("accentColor").value = normalized;
      document.getElementById("accentSwatch").style.background = normalized;
    }
  }

  function setColorValue(textId, pickerId, swatchId, hex) {
    const normalized = normalizeHex(hex) || "#000000";
    const text = document.getElementById(textId);
    const picker = document.getElementById(pickerId);
    const swatch = document.getElementById(swatchId);
    if (text) text.value = normalized;
    if (picker) picker.value = normalized;
    if (swatch) swatch.style.background = normalized;
  }

  function setTypographyColorInputsDisabled(disabled) {
    const ids = [
      "level1Color","level1ColorPicker",
      "level2Color","level2ColorPicker",
      "bodyTextColor","bodyTextColorPicker"
    ];
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.disabled = disabled;
    });
  }

  function applyTextPolicyIfFollow() {
    const policy = document.getElementById("textColorPolicy").value;
    const customBlock = document.getElementById("typographyCustomBlock");

    if (policy !== "follow") {
      customBlock.classList.remove("locked");
      setTypographyColorInputsDisabled(false);
      return;
    }

    const mode = document.getElementById("mode").value;
    const primary = normalizeHex(document.getElementById("primaryColor").value) || "#000000";
    const accent = normalizeHex(document.getElementById("accentColor").value) || "#000000";
    const body = (mode === "dark") ? "#e5e7eb" : "#111827";

    setColorValue("level1Color", "level1ColorPicker", "level1Swatch", primary);
    setColorValue("level2Color", "level2ColorPicker", "level2Swatch", accent);
    setColorValue("bodyTextColor", "bodyTextColorPicker", "bodyTextSwatch", body);

    customBlock.classList.add("locked");
    setTypographyColorInputsDisabled(true);
  }

  function bindColorTriad(pickerId, textId, swatchId) {
    const picker = document.getElementById(pickerId);
    const text = document.getElementById(textId);
    const swatch = document.getElementById(swatchId);

    function syncFromPicker() {
      const hex = normalizeHex(picker.value) || "#000000";
      text.value = hex;
      swatch.style.background = hex;
      applyTextPolicyIfFollow();
      generateYaml();
    }

    function syncFromText() {
      const hex = normalizeHex(text.value);
      if (hex) {
        picker.value = hex;
        swatch.style.background = hex;
      } else {
        swatch.style.background = "#000000";
      }
      applyTextPolicyIfFollow();
      generateYaml();
    }

    picker.addEventListener("input", syncFromPicker);
    text.addEventListener("input", syncFromText);
    swatch.style.background = normalizeHex(text.value) || "#000000";
  }

  const THEME_PRESETS = {
    "現代科技風": { mode: "light", primary: "#373399", accent: "#10b981", maxBullets: 5 },
    "極簡風":     { mode: "light", primary: "#111827", accent: "#2563eb", maxBullets: 4 },
    "商務專業風": { mode: "light", primary: "#1d4ed8", accent: "#64748b", maxBullets: 4 },
    "暗黑高對比風": { mode: "dark", primary: "#fbbf24", accent: "#38bdf8", maxBullets: 4 },
    "教育課程風": { mode: "light", primary: "#0f766e", accent: "#f59e0b", maxBullets: 5 },
    "資訊圖表風": { mode: "light", primary: "#0ea5e9", accent: "#f97316", maxBullets: 4 },
    "新創提案風": { mode: "dark",  primary: "#a78bfa", accent: "#fbbf24", maxBullets: 3 },
    "雜誌排版風": { mode: "light", primary: "#111827", accent: "#ef4444", maxBullets: 4 },
    "大字標題風": { mode: "dark",  primary: "#ffffff", accent: "#22c55e", maxBullets: 3 },
    "簡約優雅風": { mode: "light", primary: "#0f172a", accent: "#10b981", maxBullets: 4 }
  };

  const STYLE_SUMMARY_BY_THEME = {
    "現代科技風": "現代科技風格、強調可讀與對比",
    "極簡風": "極簡風格、留白充足、重點聚焦於關鍵文字",
    "商務專業風": "企業簡報風格、版面整齊、資訊層級清楚",
    "暗黑高對比風": "暗黑高對比風格、強烈對比、強調關鍵資訊",
    "教育課程風": "教學課程風格、逐步引導、重點提示清晰",
    "資訊圖表風": "資訊圖表風格、以圖示與數據視覺化為主",
    "新創提案風": "新創募資風格、故事線清晰、結論導向",
    "雜誌排版風": "雜誌排版風格、視覺層級清楚、閱讀節奏分明",
    "大字標題風": "大字標題風格、強烈字體層級、少文字高衝擊",
    "簡約優雅風": "簡約優雅風格、配色克制、留白與對齊一致"
  };

  function syncStyleSummaryUI() {
    const preset = document.getElementById("styleSummaryPreset").value;
    document.getElementById("styleSummaryCustomWrap").style.display =
      (preset === "__custom__") ? "block" : "none";
  }

  function getStyleSummaryValue() {
    const preset = document.getElementById("styleSummaryPreset").value;
    if (preset === "__custom__") return document.getElementById("styleSummaryCustom").value.trim();
    return preset;
  }

  function setStyleSummary(summaryText) {
    const selectEl = document.getElementById("styleSummaryPreset");
    const customEl = document.getElementById("styleSummaryCustom");

    let found = false;
    for (const opt of selectEl.options) {
      if (opt.value === summaryText) { found = true; break; }
    }

    if (found) {
      selectEl.value = summaryText;
      customEl.value = "";
    } else {
      selectEl.value = "__custom__";
      customEl.value = summaryText || "";
    }
    syncStyleSummaryUI();
  }

  function getThemeStyleValue() {
    const preset = document.getElementById("themeStylePreset").value;
    if (preset === "__custom__") return document.getElementById("themeStyleCustom").value.trim();
    return preset;
  }

  function applyThemePreset(styleName) {
    const preset = THEME_PRESETS[styleName];
    if (!preset) return;

    document.getElementById("mode").value = preset.mode;
    document.getElementById("maxBullets").value = String(preset.maxBullets);
    setColorAll("primary", preset.primary);
    setColorAll("accent", preset.accent);

    const summary = STYLE_SUMMARY_BY_THEME[styleName];
    if (summary) setStyleSummary(summary);

    applyTextPolicyIfFollow();
    generateYaml();
  }

  function onThemeStyleChange() {
    const preset = document.getElementById("themeStylePreset").value;
    const wrap = document.getElementById("themeStyleCustomWrap");
    const isCustom = (preset === "__custom__");
    wrap.style.display = isCustom ? "block" : "none";

    if (!isCustom) {
      applyThemePreset(preset);
      return;
    }
    applyTextPolicyIfFollow();
    generateYaml();
  }

  function buildColorUsageGuideline(primary, accent) {
    const p = normalizeHex(primary) || primary || "";
    const a = normalizeHex(accent) || accent || "";
    return `primary_color ${p} 用於按鈕、圖表、重點框線、連結等互動/強調元素；accent_color ${a} 用於次要互動/提示強調；兩者不直接等於文字顏色（文字顏色以 typography 為準）。`;
  }

  function buildTextColorPolicyGuidelineLines(policy, mode, primary, accent, h1, h2, body) {
    const p = normalizeHex(primary) || primary || "";
    const a = normalizeHex(accent) || accent || "";
    const h1c = normalizeHex(h1) || h1 || "";
    const h2c = normalizeHex(h2) || h2 || "";
    const bc = normalizeHex(body) || body || "";

    if (policy === "follow") {
      const bodyByMode = (mode === "dark") ? "#e5e7eb" : "#111827";
      return [
        "text_color_policy=follow",
        `- H1 文字色跟隨 primary_color (${p})`,
        `- H2 文字色跟隨 accent_color (${a})`,
        `- 內文文字色依 theme.mode 決定：dark→#e5e7eb / light→#111827（目前 mode=${mode}，內文預期=${bodyByMode}）`
      ];
    }

    return [
      "text_color_policy=custom",
      `- H1=${h1c}`,
      `- H2=${h2c}`,
      `- 內文=${bc}`,
      "- 不跟隨 primary/accent 或 mode 自動變更"
    ];
  }

  function applyRecommendationSafe() {
    const layout = document.getElementById("layoutStructure").value;
    const maxBulletsEl = document.getElementById("maxBullets");
    if (!maxBulletsEl) return;

    if (layout === "不指定佈局") return;
    if (layout === "蛇形流程") maxBulletsEl.value = "6";
    else if (layout === "左右對比") maxBulletsEl.value = "4";
    else if (layout === "網格矩陣") maxBulletsEl.value = "5";
    else if (layout === "中心對焦") maxBulletsEl.value = "4";
    else if (layout === "層級金字塔") maxBulletsEl.value = "5";
  }

  function applyRecommendationFull() {
    const style = document.getElementById("recommendedStyle").value;
    if (style === "數據儀表板風") document.getElementById("mode").value = "dark";
    if (style === "復古報紙風格") document.getElementById("mode").value = "light";
  }

  function applyRecommendationPolicy() {
    const policy = document.getElementById("recommendationApplyPolicy").value;
    if (policy === "apply_safe") applyRecommendationSafe();
    if (policy === "apply_full") applyRecommendationFull();
  }

  function generateYaml() {
    syncStyleSummaryUI();
    applyRecommendationPolicy();
    applyTextPolicyIfFollow();

    const name = document.getElementById("name").value;
    const author = document.getElementById("author").value;
    const description = document.getElementById("description").value;
    const version = document.getElementById("version").value;
    const language = document.getElementById("language").value;

    const themeStyle = getThemeStyleValue();
    const mode = document.getElementById("mode").value;
    const primaryColor = document.getElementById("primaryColor").value;
    const accentColor = document.getElementById("accentColor").value;

    const requirementType = document.getElementById("requirementType").value;
    const recommendedStyle = document.getElementById("recommendedStyle").value;
    const layoutStructure = document.getElementById("layoutStructure").value;
    const recommendationApplyPolicy = document.getElementById("recommendationApplyPolicy").value;

    const policy = document.getElementById("textColorPolicy").value;

    const level1Font = document.getElementById("level1Font").value;
    const level1Weight = document.getElementById("level1Weight").value;
    const level1Color = document.getElementById("level1Color").value;
    const level1Size = document.getElementById("level1Size").value;

    const level2Font = document.getElementById("level2Font").value;
    const level2Weight = document.getElementById("level2Weight").value;
    const level2Color = document.getElementById("level2Color").value;
    const level2Size = document.getElementById("level2Size").value;

    const bodyTextFont = document.getElementById("bodyTextFont").value;
    const bodyTextWeight = document.getElementById("bodyTextWeight").value;
    const bodyTextColor = document.getElementById("bodyTextColor").value;
    const bodyTextSize = document.getElementById("bodyTextSize").value;

    const maxBullets = document.getElementById("maxBullets").value;
    const maxWords = document.getElementById("maxWords").value;
    const maxLines = document.getElementById("maxLines").value;

    const styleSummary = getStyleSummaryValue();
    const densityRule = document.getElementById("densityRule").value;

    const colorUsageGuideline = buildColorUsageGuideline(primaryColor, accentColor);
    const textColorPolicyGuidelineLines = buildTextColorPolicyGuidelineLines(
      policy, mode, primaryColor, accentColor, level1Color, level2Color, bodyTextColor
    );

    const yaml =
`metadata:
  version: ${escapeYamlString(version)}
  name: ${escapeYamlString(name)}
  author: ${escapeYamlString(author)}
  description: ${escapeYamlString(description)}
  language: ${escapeYamlString(language)}

theme:
  style: ${escapeYamlString(themeStyle)}
  mode: ${escapeYamlString(mode)}
  primary_color: ${escapeYamlString(primaryColor)}
  accent_color: ${escapeYamlString(accentColor)}

typography:
  text_color_policy: ${escapeYamlString(policy)}
  level1_font: ${escapeYamlString(level1Font)}
  level1_weight: ${escapeYamlString(level1Weight)}
  level1_color: ${escapeYamlString(level1Color)}
  level1_size: ${escapeYamlString(level1Size)}
  level2_font: ${escapeYamlString(level2Font)}
  level2_weight: ${escapeYamlString(level2Weight)}
  level2_color: ${escapeYamlString(level2Color)}
  level2_size: ${escapeYamlString(level2Size)}
  body_text_font: ${escapeYamlString(bodyTextFont)}
  body_text_weight: ${escapeYamlString(bodyTextWeight)}
  body_text_color: ${escapeYamlString(bodyTextColor)}
  body_text_size: ${escapeYamlString(bodyTextSize)}

layout:
  slide_width: 960
  slide_height: 540
  padding_top: 64
  padding_bottom: 64
  max_content_height: 412

content_rules:
  max_bullets_per_slide: ${maxBullets}
  max_words_per_bullet: ${maxWords}
  max_lines_per_paragraph: ${maxLines}
  one_main_idea_per_slide: true

guidelines:
  style_summary: ${escapeYamlString(styleSummary)}
  content_density_rule: ${escapeYamlString(densityRule)}
  color_usage_guideline: ${escapeYamlString(colorUsageGuideline)}
  text_color_policy_guideline: ${yamlBlockScalar(textColorPolicyGuidelineLines)}
  requirement_type: ${escapeYamlString(requirementType)}
  recommended_style: ${escapeYamlString(recommendedStyle)}
  layout_structure: ${escapeYamlString(layoutStructure)}
  recommendation_apply_policy: ${escapeYamlString(recommendationApplyPolicy)}
`;
    document.getElementById("yamlOutput").value = yaml;
  }

  function pad2(n) { return String(n).padStart(2, "0"); }
  function formatTimestamp(formatKey) {
    const d = new Date();
    const y = d.getFullYear();
    const m = pad2(d.getMonth() + 1);
    const day = pad2(d.getDate());
    const hh = pad2(d.getHours());
    const mm = pad2(d.getMinutes());
    const ss = pad2(d.getSeconds());
    if (formatKey === "date") return `${y}-${m}-${day}`;
    return `${y}-${m}-${day}_${hh}-${mm}-${ss}`;
  }

  function makeSafeFilename(name) {
    const base = (name || "YAML")
      .toString()
      .trim()
      .replace(/[\\/:*?"<>|]+/g, "-")
      .replace(/\s+/g, "_");
    return base || "YAML";
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function downloadCurrentAsText(ext) {
    generateYaml();
    const yamlText = document.getElementById("yamlOutput").value || "";
    const prefix = makeSafeFilename(document.getElementById("filePrefix").value || "YAML");
    const ts = formatTimestamp(document.getElementById("timestampFormat").value);
    const filename = `${prefix}-${ts}.${ext}`;

    const mime = (ext === "txt") ? "text/plain;charset=utf-8" : "text/yaml;charset=utf-8";
    const blob = new Blob([yamlText], { type: mime });
    downloadBlob(blob, filename);
  }

  function downloadCurrentAsPdf() {
    generateYaml();
    const yamlText = document.getElementById("yamlOutput").value || "";
    const prefix = makeSafeFilename(document.getElementById("filePrefix").value || "YAML");
    const ts = formatTimestamp(document.getElementById("timestampFormat").value);
    const filename = `${prefix}-${ts}.pdf`;

    const fontSize = Number(document.getElementById("pdfFontSize").value || 10);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    doc.setFont("courier", "normal");
    doc.setFontSize(fontSize);

    const margin = 36;
    const pageWidth = doc.internal.pageSize.getWidth();
    const maxWidth = pageWidth - margin * 2;

    const lines = doc.splitTextToSize(yamlText, maxWidth);
    doc.text(lines, margin, margin);
    doc.save(filename);
  }

  function downloadFile() {
    const fmt = document.getElementById("downloadFormat").value;
    if (fmt === "pdf") downloadCurrentAsPdf();
    else if (fmt === "txt") downloadCurrentAsText("txt");
    else downloadCurrentAsText("yaml");
  }

  function resetForm() {
    document.getElementById("name").value = "Cybersecurity Training";
    document.getElementById("author").value = "Cybersecurity Education Team";
    document.getElementById("description").value = "資安教育簡報的統一風格指南";
    document.getElementById("version").value = "1.0";
    document.getElementById("language").value = "zh-TW";

    document.getElementById("requirementType").value = "行銷懶人包";
    document.getElementById("recommendedStyle").value = "可愛粉嫩風格";
    document.getElementById("layoutStructure").value = "不指定佈局";
    document.getElementById("recommendationApplyPolicy").value = "manual";

    document.getElementById("themeStylePreset").value = "現代科技風";
    document.getElementById("themeStyleCustom").value = "";
    document.getElementById("themeStyleCustomWrap").style.display = "none";

    document.getElementById("textColorPolicy").value = "follow";

    document.getElementById("level1Font").value = "Arial, sans-serif";
    document.getElementById("level1Weight").value = "normal";
    document.getElementById("level1Size").value = "36";

    document.getElementById("level2Font").value = "Arial, sans-serif";
    document.getElementById("level2Weight").value = "normal";
    document.getElementById("level2Size").value = "24";

    document.getElementById("bodyTextFont").value = "Arial, sans-serif";
    document.getElementById("bodyTextWeight").value = "normal";
    document.getElementById("bodyTextSize").value = "18";

    document.getElementById("maxWords").value = "20";
    document.getElementById("maxLines").value = "8";
    document.getElementById("densityRule").value =
      "每張投影片僅包含一個主要概念，條列不超過上限，必要時拆成多張。";

    document.getElementById("filePrefix").value = "YAML";
    document.getElementById("timestampFormat").value = "date";
    document.getElementById("downloadFormat").value = "yaml";
    document.getElementById("pdfFontSize").value = "10";

    applyThemePreset("現代科技風");
    generateYaml();
  }

  function copyYaml() {
    const ta = document.getElementById("yamlOutput");
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, 999999);
    const ok = document.execCommand("copy");
    const hint = document.getElementById("copyHint");
    hint.textContent = ok ? "已複製到剪貼簿" : "無法自動複製，請手動選取";
    setTimeout(() => { hint.textContent = ""; }, 2000);
  }

  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("btnDownload").addEventListener("click", downloadFile);
    document.getElementById("btnReset").addEventListener("click", resetForm);
    document.getElementById("btnCopy").addEventListener("click", copyYaml);

    document.getElementById("themeStylePreset").addEventListener("change", onThemeStyleChange);

    const ssp = document.getElementById("styleSummaryPreset");
    ssp.addEventListener("change", () => { syncStyleSummaryUI(); generateYaml(); });
    ssp.addEventListener("input",  () => { syncStyleSummaryUI(); generateYaml(); });

    ["requirementType","recommendedStyle","layoutStructure","recommendationApplyPolicy","textColorPolicy"].forEach(id => {
      document.getElementById(id).addEventListener("change", generateYaml);
    }); // select 用 change 事件 [web:95]

    bindColorTriad("primaryColorPicker","primaryColor","primarySwatch");
    bindColorTriad("accentColorPicker","accentColor","accentSwatch");
    bindColorTriad("level1ColorPicker","level1Color","level1Swatch");
    bindColorTriad("level2ColorPicker","level2Color","level2Swatch");
    bindColorTriad("bodyTextColorPicker","bodyTextColor","bodyTextSwatch");

    const ids = [
      "name","author","description","version","language",
      "themeStyleCustom","styleSummaryCustom",
      "level1Font","level1Weight","level1Size",
      "level2Font","level2Weight","level2Size",
      "bodyTextFont","bodyTextWeight","bodyTextSize",
      "maxBullets","maxWords","maxLines","densityRule",
      "filePrefix","timestampFormat","downloadFormat","pdfFontSize"
    ];
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
        el.addEventListener("input", generateYaml);
        el.addEventListener("change", generateYaml);
      });

      document.getElementById("mode").addEventListener("change", () => {
        applyTextPolicyIfFollow();
        generateYaml();
      }); // select 的變更用 change [web:95]

      // 初始化：先套用預設主題，再輸出 YAML
      onThemeStyleChange();
      syncStyleSummaryUI();
      applyTextPolicyIfFollow();
      generateYaml();
    });
</script>
